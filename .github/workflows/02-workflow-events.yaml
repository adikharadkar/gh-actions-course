name: 02 - Workflow Events
on:
  push:
  pull_request:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  echo:
    runs-on: ubuntu-latest
    steps:
      - name: show the triggering event
        run: echo "The event that triggered this workflow is a(n) ${{ github.event_name}} event."
