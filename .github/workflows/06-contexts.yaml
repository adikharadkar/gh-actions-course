name: 06 - Contexts
run-name: 06 - Contexts | DEBUG - ${{ inputs.debug }}
env:
  MY_WORKFLOW_VAR: "workflow"
  MY_OVERWRITTEN_VAR: "workflow"
on:
  # push:
  workflow_dispatch:
    inputs:
      debug:
        type: boolean
        default: false
jobs:
  echo-data:
    runs-on: ubuntu-latest
    env:
      MY_JOB_VAR: "job"
      MY_OVERWRITTEN_VAR: "job"
    steps:
      - name: Display Information
        run: |
          echo "Event name: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "SHA: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"
          echo "Workflow: ${{ github.workflow }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Run number: ${{ github.run_number }}"
      - name: Retrieve Variable
        run: |
          echo "Retrieving variable: ${{ vars.MY_VAR }}"
      - name: Display Enironment Variables 1
        env:
          MY_OVERWRITTEN_VAR: "step"
        run: |
          echo "My workflow variable: ${{ env.MY_WORKFLOW_VAR }}"
          echo "My Job Variable: ${{ env.MY_JOB_VAR }}"
          echo "My overwritten variable: ${{ env.MY_OVERWRITTEN_VAR }}"
      - name: Display Environment Variables 2
        run: |
          echo "My workflow variable: ${{ env.MY_WORKFLOW_VAR }}"
          echo "My Job Variable: ${{ env.MY_JOB_VAR }}"
          echo "My overwritten variable: ${{ env.MY_OVERWRITTEN_VAR }}"
